{% extends "base.html" %}

{% block title %}FAQ | GFG Club{% endblock %}

{% block content %}
<main class="page-shell clean-page-shell">
    <section class="page-hero glass-card clean-hero-card" data-animate="fade-up">
        <p class="eyebrow">FAQ</p>
        <h1 class="gradient-title">Common questions, answered clearly.</h1>
        <p class="section-copy">Quick answers about events, access, and club activity.</p>
    </section>

    <section class="leader-preview-list clean-card-grid" data-animate="fade-up">
        {% for item in faqs %}
            <article class="glass-card compact-card data-card clean-data-card">
                <h3>{{ item.question }}</h3>
                <p>{{ item.answer }}</p>
            </article>
        {% endfor %}
    </section>
</main>
{% endblock %}
