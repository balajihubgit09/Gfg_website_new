services:
  - type: web
    name: gfg-website-new
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/gfg_club.db
      - key: INSTANCE_DIR
        value: /var/data
    disk:
      name: gfg-data
      mountPath: /var/data
      sizeGB: 1
